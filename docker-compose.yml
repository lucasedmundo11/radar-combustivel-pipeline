version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: radar-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-init:
    image: mongo:7
    container_name: radar-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    restart: on-failure
    command:
      - mongosh
      - --host
      - mongo:27017
      - --quiet
      - --eval
      - "try { rs.status() } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongo:27017'}]}) }"

  redis:
    image: redis/redis-stack-server:latest
    container_name: radar-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  seed:
    image: python:3.11-slim
    container_name: radar-seed
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - MONGO_URI=mongodb://mongo:27017/?directConnection=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_NAME=radar_combustivel
      - N=10000
      - BATCH_SIZE=2000
    command:
      - bash
      - -lc
      - |
        pip install -r requirements.txt -q &&
        python init/mongo_seed.py &&
        python init/redis_indexes.py
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully

  pipeline:
    image: python:3.11-slim
    container_name: radar-pipeline
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - MONGO_URI=mongodb://mongo:27017/?directConnection=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_NAME=radar_combustivel
    command:
      - bash
      - -lc
      - pip install -r requirements.txt -q && python pipeline/mongodb_consumer.py
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  dashboard:
    image: python:3.11-slim
    container_name: radar-dashboard
    working_dir: /workspace
    ports:
      - "8501:8501"
    volumes:
      - ./:/workspace
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command:
      - bash
      - -lc
      - pip install -r requirements.txt -q && streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
